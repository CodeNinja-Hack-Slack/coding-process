# coding-process 工作流模式定义
# 适配 OpenCode — 7 种核心场景
# AI 通过自然语言分析自动选择合适的场景

version: 5.0.0

# ============================================================
# 场景定义
# ============================================================

modes:
  # ==================== 场景 1：新功能 ====================
  feature:
    name: 新功能
    description: 开发完整功能（探索 → 设计 → 计划 → 实施 → 审查 → 完成）
    triggers:
      keywords: [功能, feature, 添加, 新建, 创建, 实现, 开发]
    stages:
      - name: EXPLORING
        skill: brainstorming
        description: 理解需求，探索代码
      - name: PROPOSING
        skill: brainstorming
        description: 提出设计方案
      - name: PLANNING
        skill: writing-plans
        description: 制定实施计划
      - name: BUILDING
        skill: subagent-driven-development
        description: 实施开发
      - name: REVIEWING
        skill: requesting-code-review
        description: 代码审查
      - name: VERIFYING
        skill: verification-before-completion
        description: 验证完成
      - name: FINISHING
        skill: finishing-a-development-branch
        description: 完成收尾

  # ==================== 场景 2：修 bug ====================
  bugfix:
    name: 修 bug
    description: 修复 bug（调试定位 → 修复 → 验证）
    triggers:
      keywords: [bug, 修复, fix, 问题, 异常, 报错, 错误, 崩溃]
    stages:
      - name: EXPLORING
        skill: systematic-debugging
        description: 调试定位
      - name: BUILDING
        skill: subagent-driven-development
        description: 实施修复
      - name: VERIFYING
        skill: verification-before-completion
        description: 验证修复

  # ==================== 场景 3：快速修改 ====================
  quick:
    name: 快速修改
    description: 小改动、typo、配置调整（直接修改，跳过设计）
    triggers:
      keywords: [改, typo, 配置, 调整, 修改, 简单, 快速]
    stages:
      - name: BUILDING
        skill: subagent-driven-development
        description: 直接修改
      - name: FINISHING
        skill: finishing-a-development-branch
        description: 完成收尾

  # ==================== 场景 4：代码审查 ====================
  review:
    name: 代码审查
    description: 审查现有代码（理解 → 审查）
    triggers:
      keywords: [review, 审查, 检查代码, 看看, code review]
    stages:
      - name: EXPLORING
        skill: brainstorming
        description: 理解代码
      - name: REVIEWING
        skill: requesting-code-review
        description: 执行审查

  # ==================== 场景 5：重构 ====================
  refactor:
    name: 重构
    description: 优化代码结构（分析 → 设计 → 重构 → 审查）
    triggers:
      keywords: [refactor, 重构, 优化代码, 整理, 重写, 结构优化]
    stages:
      - name: EXPLORING
        skill: brainstorming
        description: 分析现有代码
      - name: PROPOSING
        skill: brainstorming
        description: 设计优化方案
      - name: PLANNING
        skill: writing-plans
        description: 制定重构计划
      - name: BUILDING
        skill: subagent-driven-development
        description: 执行重构
      - name: REVIEWING
        skill: requesting-code-review
        description: 审查重构结果

  # ==================== 场景 6：TDD 开发 ====================
  tdd:
    name: TDD 开发
    description: 测试驱动开发（先写测试，再写代码）
    triggers:
      keywords: [tdd, 测试驱动, test-driven, 先写测试]
    stages:
      - name: EXPLORING
        skill: brainstorming
        description: 理解需求
      - name: PROPOSING
        skill: brainstorming
        description: 设计方案
      - name: PLANNING
        skill: test-driven-development
        description: 编写测试用例
      - name: BUILDING
        skill: test-driven-development
        description: 实现功能
      - name: REVIEWING
        skill: requesting-code-review
        description: 代码审查
      - name: VERIFYING
        skill: verification-before-completion
        description: 验证完成
      - name: FINISHING
        skill: finishing-a-development-branch
        description: 完成收尾

  # ==================== 场景 7：并行开发 ====================
  parallel:
    name: 并行开发
    description: 并行开发多个独立任务（拆分 → 并行执行 → 合并）
    triggers:
      keywords: [并行, parallel, 同时开发, 多任务, 拆分]
    stages:
      - name: EXPLORING
        skill: brainstorming
        description: 理解需求
      - name: PROPOSING
        skill: brainstorming
        description: 设计方案
      - name: PLANNING
        skill: dispatching-parallel-agents
        description: 拆分并行任务
      - name: BUILDING
        skill: dispatching-parallel-agents
        description: 并行实施
      - name: REVIEWING
        skill: requesting-code-review
        description: 代码审查
      - name: VERIFYING
        skill: verification-before-completion
        description: 验证完成
      - name: FINISHING
        skill: finishing-a-development-branch
        description: 完成收尾
